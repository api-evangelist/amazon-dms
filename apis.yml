aid: amazon-dms
name: Amazon DMS
description: >-
  AWS Database Migration Service (AWS DMS) helps you migrate databases to AWS
  quickly and securely. The source database remains fully operational during the
  migration, minimizing downtime to applications that rely on the database. AWS
  DMS can migrate your data to and from the most widely used commercial and
  open-source databases, supporting homogeneous and heterogeneous migrations
  with continuous data replication.
